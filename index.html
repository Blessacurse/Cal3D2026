<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Calc | Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #020617);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* El contenedor Liquid Glass */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            text-align: center;
            color: #818cf8;
            letter-spacing: -0.025em;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .results {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
        }

        .price-tag {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-top: 1rem;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }

        .price-tag span {
            font-size: 0.9rem;
            display: block;
            color: #94a3b8;
            font-weight: 400;
        }

        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #475569;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <h2>3D Print Calc</h2>
    
    <div class="input-group">
        <label>Peso de la pieza (gramos)</label>
        <input type="number" id="peso" placeholder="Ej: 210.81" oninput="calcular()">
    </div>

    <div class="input-group">
        <label>Tiempo estimado (Horas)</label>
        <input type="number" id="tiempo" placeholder="Ej: 8.37" oninput="calcular()">
    </div>

    <div class="input-group">
        <label>Margen de Ganancia (x3 o x4)</label>
        <input type="number" id="margen" value="3" step="0.5" oninput="calcular()">
    </div>

    <div class="results">
        <div class="result-item">
            <span>Costo Material:</span>
            <span id="costoMaterial">$0.00</span>
        </div>
        <div class="result-item">
            <span>Depreciación Máquina:</span>
            <span id="costoMaquina">$0.00</span>
        </div>
        <div class="result-item">
            <span>Consumo Luz (CCS):</span>
            <span id="costoLuz">$0.00</span>
        </div>
        
        <div class="price-tag">
            <span id="totalBaseText">Precio Final Sugerido</span>
            <div id="precioFinal">$0.00</div>
        </div>
    </div>

    <div class="footer">
        Configurada para Caracas 2026 | Inversión $800
    </div>
</div>

<script>
    function calcular() {
        // Constantes basadas en tu configuración
        const PRECIO_BOBINA = 20;
        const GRAMOS_BOBINA = 1000;
        const INVERSION_TOTAL = 800; // Impresora + Nacionalización
        const VIDA_UTIL_HORAS = 2500;
        const KWH_COSTO = 0.10; // Caracas 2026
        const CONSUMO_KW = 0.2; // 200W promedio de la impresora

        // Valores de los inputs
        const peso = parseFloat(document.getElementById('peso').value) || 0;
        const tiempo = parseFloat(document.getElementById('tiempo').value) || 0;
        const margen = parseFloat(document.getElementById('margen').value) || 1;

        // Cálculos
        const material = (peso * (PRECIO_BOBINA / GRAMOS_BOBINA)) * 1.05; // 5% desperdicio
        const maquina = (tiempo * (INVERSION_TOTAL / VIDA_UTIL_HORAS));
        const luz = tiempo * CONSUMO_KW * KWH_COSTO;
        
        const costoBase = material + maquina + luz;
        const precioFinal = costoBase * margen;

        // Mostrar resultados
        document.getElementById('costoMaterial').innerText = `$${material.toFixed(2)}`;
        document.getElementById('costoMaquina').innerText = `$${maquina.toFixed(2)}`;
        document.getElementById('costoLuz').innerText = `$${luz.toFixed(2)}`;
        document.getElementById('precioFinal').innerText = `$${precioFinal.toFixed(2)}`;
    }
</script>

</body>
</html>
